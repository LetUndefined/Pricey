<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d2e41"/>
      <stop offset="100%" stop-color="#264d7a"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#f4723e"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- C letterform drawn as a thick arc -->
  <path
    d="M 300 130
       A 110 110 0 1 0 300 270"
    fill="none"
    stroke="url(#arc)"
    stroke-width="52"
    stroke-linecap="round"
  />
</svg>
